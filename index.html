nt of Execution સુધીના Method Calls ની Hierarchy બતાવે છે, જે Program Flow Track કરવામાં મદદ કરે છે.</div></div></div>`

Flexible છે, Nાના Increments માં Deliver કરે છે. Waterfall Sequential છે, Phases પૂરા થાય પછી આગળ વધે છે.</div><div style="margin-top:16px;"></div><div class="question">પ્રશ્ન ૨: Scrum માં Sprint શું છે?</div><div class="answer"><strong>જવાબ:</strong> Sprint એ Time-boxed Period છે (સામાન્ય રીતે 2-4 અઠવાડિયા) જે દરમિયાન Features Develop અને Complete થાય છે.</div></div></div>`

            content: `<div class="topic-header"><h2><i class="fa-solid fa-broom" style="color:#1a2a6c;"></i> 33. Clean Code <span class="badge">Clean Code</span></h2><div class="subtitle">Write readable, maintainable, and reusable code.</div></div><h3>📖 What is Clean Code? / Clean Code એટલે શું?</h3><p>Clean code is code that is easy to read, understand, and maintain. It follows best practices and principles.</p><h4>Principles</h4><ul><li>✔ Meaningful variable names</li><li>✔ Small, focused methods</li><li>✔ Reusable code</li><li>✔ SOLID Principles (Single Responsibility, Open/Closed, Liskov Substitution, Interface Segregation, Dependency Inversion)</li><li>✔ DRY (Don't Repeat Yourself)</li><li>✔ KISS (Keep It Simple, Stupid)</li><li>✔ Proper folder structure</li></ul><div class="divider"></div><h3>❓ Q&A — Interview Questions</h3><div class="qa-container"><div class="qa-box english"><span class="lang-badge">🇬🇧 English</span><div class="question">Q1: What is the Single Responsibility Principle?</div><div class="answer"><strong>Answer:</strong> A class should have only one reason to change, meaning it should have only one responsibility.</div><div style="margin-top:16px;"></div><div class="question">Q2: What does DRY stand for?</div><div class="answer"><strong>Answer:</strong> DRY stands for "Don't Repeat Yourself" — avoid duplication by abstracting common logic.</div></div><div class="qa-box gujarati"><span class="lang-badge">🇮🇳 ગુજરાતી</span><div class="question">પ્રશ્ન ૧: Single Responsibility Principle શું છે?</div><div class="answer"><strong>જવાબ:</strong> Class ને ફક્ત એક જ Responsibility હોવી જોઈએ, એટલે કે તેની પાસે Change થવાનું ફક્ત એક કારણ હોવું જોઈએ.</div><div style="margin-top:16px;"></div><div class="question">પ્રશ્ન ૨: DRY નો અર્થ શું છે?</div><div class="answer"><strong>જવાબ:</strong> DRY એટલે "Don't Repeat Yourself" — Common Logic ને Abstract કરીને Duplication Avoid કરો.</div></div></div>`

iv><div class="answer"><strong>જવાબ:</strong> તે બધી Skills (C#, SQL, EF Core, Angular, APIs) Integrate કરે છે અને Real-world Problem Solving Abilities દર્શાવે છે.</div><div style="margin-top:16px;"></div><div class="question">પ્રશ્ન ૨: Project માં કયા Patterns વપરાય છે?</div><div class="answer"><strong>જવાબ:</strong> Repository Pattern, Service Layer, Dependency Injection, અને DTOs સામાન્ય રીતે વપરાય છે.</div></div></div>`
        }];

        // Combine all topics
        const TOPICS = [...CORE_TOPICS, ...EXTRA_TOPICS];

        // ============================================================
        //  RENDER
        // ============================================================

        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '';
            TOPICS.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'topic-link';
                btn.dataset.topic = t.id;
                btn.innerHTML =
                    `<span class="num">${String(t.num).padStart(2, '0')}</span><span class="icon"><i class="${t.icon}"></i></span><span>${t.label}</span><span style="margin-left:auto;font-size:11px;color:var(--text-light);">${t.gujarati}</span>`;
                btn.addEventListener('click', () => { showTopic(t.id);
                    closeSidebar(); });
                nav.appendChild(btn);
            });
        }

        function renderTopics() {
            const main = document.getElementById('mainContent');
            main.innerHTML = '';
            TOPICS.forEach(t => {
                const card = document.createElement('div');
                card.className = 'topic-card';
                card.id = `topic-${t.id}`;
                card.innerHTML = t.content;
                main.appendChild(card);
            });
        }

        function showTopic(id) {
            document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('active'));
            const target = document.getElementById(`topic-${id}`);
            if (target) target.classList.add('active');
            document.querySelectorAll('.topic-link').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.querySelector(`.topic-link[data-topic="${id}"]`);
            if (activeBtn) activeBtn.classList.add('active');
            history.pushState(null, '', `#${id}`);
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // ============================================================
        //  INIT
        // ============================================================

        renderSidebar();
        renderTopics();

        const hash = window.location.hash.replace('#', '');
        showTopic(hash || 'variables');

        document.getElementById('hamburgerBtn').addEventListener('click', toggleSidebar);

        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const hamburger = document.getElementById('hamburgerBtn');
            if (window.innerWidth <= 900) {
                if (!sidebar.contains(e.target) && !hamburger.contains(e.target)) {
                    closeSidebar();
                }
            }
        });

        window.addEventListener('hashchange', () => {
            const id = window.location.hash.replace('#', '') || 'variables';
            showTopic(id);
        });

        console.log('🚀 Full guide loaded — 34 topics with bilingual Q&A!');
    </script>

</body>
